version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEVICE=cpu
      - MODEL_CACHE_DIR=/app/models
      - LOG_LEVEL=INFO
      - HF_TOKEN=${HF_TOKEN:-}
      - ENABLE_PII_DETECTION=true
      - REQUIRE_CONSENT=true
      - BIAS_THRESHOLD=0.15
    volumes:
      - model_cache:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4173:4173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  model_cache:
